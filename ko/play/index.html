<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Slope 게임 온라인 플레이 - 무료 | SpeedSlope.online</title>
  <meta name="description" content="지금 Speed Slope 게임을 온라인으로 플레이하세요! 네온 3D 슬로프에서 굴러가는 공을 조종하세요. 장애물을 피하고 최고 점수를 노려보세요. 무료, 다운로드 불필요.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://speedslope.online/ko/play/">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "홈", "item": "https://speedslope.online/ko/"},
      {"@type": "ListItem", "position": 2, "name": "Speed Slope 플레이", "item": "https://speedslope.online/ko/play/"}
    ]
  }
  </script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    .game-wrapper { width: 100%; height: calc(100vh - 56px); position: relative; }
    .game-wrapper iframe { width: 100%; height: 100%; border: none; }
    .game-header { background: #1a1a2e; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; color: #fff; height: 56px; box-sizing: border-box; }
    .game-header .back-link { color: #e94560; text-decoration: none; font-weight: bold; }
    .game-header h1 { font-size: 18px; margin: 0; color: #fff; }
  </style>
</head>
<body>
  <div class="game-header">
    <a href="/ko/" class="back-link">← 뒤로</a>
    <h1>Speed Slope 게임 - 온라인 플레이</h1>
    <span style="font-size:12px;opacity:0.6;">v1.0</span>
  </div>
  <div class="game-wrapper" id="gameContainer">
    <div id="playOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(142deg,rgba(61,99,205,.6),rgba(100,36,219,.6)),rgba(0,0,0,.8);z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;">
      <div style="width:160px;height:96px;background:#5920c5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;">🏎️</div>
      <p style="color:#fff;font-size:28px;font-weight:bold;">Speed Slope</p>
      <button id="btnPlay" style="background:linear-gradient(94.63deg,#3d63cd 10.2%,#6424db 89.98%);color:#fff;border:none;padding:12px 40px;border-radius:70px;font-size:24px;font-weight:bold;cursor:pointer;box-shadow:6px 2px 20px 0 rgba(10,10,10,.3);" onclick="loadGame()">▶ 플레이</button>
    </div>
  </div>
  <script>
  function loadGame() {
    var overlay = document.getElementById('playOverlay');
    if (overlay) overlay.remove();
    var container = document.getElementById('gameContainer');
    var iframe = document.createElement('iframe');
    iframe.setAttribute('src', 'https://games.ofree.io/speed-slope/play.html');
    iframe.setAttribute('title', 'Speed Slope 게임');
    iframe.setAttribute('allowfullscreen', 'true');
    iframe.setAttribute('scrolling', 'no');
    iframe.setAttribute('allow', 'autoplay; fullscreen; camera; gamepad; accelerometer; gyroscope');
    container.appendChild(iframe);
  }
  </script>
</body>
</html>
