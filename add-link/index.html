<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加链接</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1; }
    .modal { position: relative; z-index: 2; background: #fff; border-radius: 12px; width: 520px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,0.15); padding: 28px 32px 24px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .modal-close { background: none; border: none; font-size: 22px; color: #999; cursor: pointer; padding: 4px; line-height: 1; }
    .modal-close:hover { color: #333; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    .form-group label .required { color: #e53e3e; margin-left: 2px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a1a1a; transition: border-color 0.2s; outline: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group .counter { font-size: 12px; color: #999; margin-top: 4px; }
    .form-group .counter.warn { color: #e53e3e; }
    .form-group .hint { font-size: 12px; color: #999; margin-top: 4px; }
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
    .btn { padding: 8px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; font-family: inherit; }
    .btn-cancel { background: #f0f0f0; color: #555; }
    .btn-cancel:hover { background: #e5e5e5; }
    .btn-save { background: #3b82f6; color: #fff; font-weight: 600; }
    .btn-save:hover { background: #2563eb; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 10; animation: fadeInOut 2s ease; }
    @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(-10px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="overlay" onclick="document.querySelector('.modal').style.display='none';document.querySelector('.overlay').style.display='none';"></div>
  <div class="modal">
    <div class="modal-header">
      <h2>添加链接</h2>
      <button class="modal-close" onclick="document.querySelector('.modal').style.display='none';document.querySelector('.overlay').style.display='none';">&times;</button>
    </div>
    <form id="linkForm" onsubmit="saveLink(event)">
      <div class="form-group">
        <label>标题 <span class="required">*</span></label>
        <input type="text" id="title" placeholder="标题 *" maxlength="80" required oninput="updateCounter('titleCount', this.value, 80)">
        <div class="counter" id="titleCount">0/80</div>
      </div>
      <div class="form-group">
        <label>URL <span class="required">*</span></label>
        <input type="url" id="url" placeholder="URL *" maxlength="1024" required oninput="updateCounter('urlCount', this.value, 1024)">
        <div class="counter" id="urlCount">0/1024</div>
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="desc" placeholder="描述" maxlength="260" oninput="updateCounter('descCount', this.value, 260)"></textarea>
        <div class="counter" id="descCount">0/260</div>
      </div>
      <div class="form-group">
        <label>锚文本</label>
        <textarea id="anchor" placeholder="锚文本" maxlength="500" oninput="updateCounter('anchorCount', this.value, 500)"></textarea>
        <div class="hint">每行一个锚文本</div>
        <div class="counter" id="anchorCount">0/500</div>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="email" placeholder="邮箱" maxlength="100" oninput="updateCounter('emailCount', this.value, 100)">
        <div class="counter" id="emailCount">0/100</div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-cancel" onclick="document.querySelector('.modal').style.display='none';document.querySelector('.overlay').style.display='none';">取消</button>
        <button type="submit" class="btn btn-save">保存</button>
      </div>
    </form>
  </div>

  <script>
  function updateCounter(id, val, max) {
    var el = document.getElementById(id);
    var len = val.length;
    el.textContent = len + '/' + max;
    el.className = 'counter' + (len >= max ? ' warn' : '');
  }
  function saveLink(e) {
    e.preventDefault();
    var data = {
      title: document.getElementById('title').value.trim(),
      url: document.getElementById('url').value.trim(),
      desc: document.getElementById('desc').value.trim(),
      anchor: document.getElementById('anchor').value.trim(),
      email: document.getElementById('email').value.trim(),
      createdAt: new Date().toISOString()
    };
    var links = JSON.parse(localStorage.getItem('speedSlopeLinks') || '[]');
    links.push(data);
    localStorage.setItem('speedSlopeLinks', JSON.stringify(links));
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = '链接已保存！';
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2000);
    e.target.reset();
    ['titleCount','urlCount','descCount','anchorCount','emailCount'].forEach(function(id) {
      document.getElementById(id).textContent = '0/' + document.getElementById(id.replace('Count','')).maxLength;
    });
  }
  </script>
</body>
</html>
